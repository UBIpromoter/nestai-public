<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mohawk Trail & Frontier Regional School Districts</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; }
  #map { width: 100%; height: 100vh; }
  .legend {
    background: rgba(255,255,255,0.95);
    padding: 14px 18px;
    border-radius: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    font-size: 14px;
    line-height: 1.8;
    color: #333;
  }
  .legend h4 { margin: 0 0 8px 0; font-size: 15px; color: #111; }
  .legend-item { display: flex; align-items: center; gap: 8px; }
  .legend-swatch {
    width: 18px; height: 18px; border-radius: 3px; border: 1px solid rgba(0,0,0,0.2);
    flex-shrink: 0;
  }
  .title-bar {
    position: absolute; top: 0; left: 0; right: 0; z-index: 1000;
    background: rgba(26,26,46,0.92); backdrop-filter: blur(8px);
    padding: 12px 20px; text-align: center;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .title-bar h1 { font-size: 20px; font-weight: 600; color: #fff; letter-spacing: 0.3px; }
  .title-bar p { font-size: 13px; color: #aaa; margin-top: 2px; }
  .town-label {
    background: none; border: none; box-shadow: none;
    font-size: 11px; font-weight: 600; color: #333;
    text-shadow: 1px 1px 2px rgba(255,255,255,0.9), -1px -1px 2px rgba(255,255,255,0.9),
                 0 1px 2px rgba(255,255,255,0.9), 0 -1px 2px rgba(255,255,255,0.9);
    white-space: nowrap; text-align: center;
    position: relative; z-index: 800 !important;
  }
  .town-label-other {
    background: none; border: none; box-shadow: none;
    font-size: 9px; font-weight: 400; color: #888;
    text-shadow: 1px 1px 1px rgba(255,255,255,0.7), -1px -1px 1px rgba(255,255,255,0.7);
    white-space: nowrap; text-align: center;
  }
  .leaflet-control-attribution { display: none !important; }

  /* View toggle tabs */
  .view-toggle {
    position: absolute; top: 65px; right: 14px; z-index: 1000;
    display: flex; gap: 0; border-radius: 6px; overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }
  .view-btn {
    padding: 7px 14px; border: none; cursor: pointer;
    font-size: 13px; font-weight: 500; font-family: inherit;
    background: rgba(255,255,255,0.85); color: #555;
    transition: background 0.15s, color 0.15s;
  }
  .view-btn:first-child { border-right: 1px solid #ddd; }
  .view-btn.active { background: #2563eb; color: #fff; }
  .view-btn:hover:not(.active) { background: rgba(255,255,255,1); color: #333; }

  /* Print button */
  .print-btn {
    position: absolute; bottom: 30px; left: 14px; z-index: 1001;
    padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer;
    font-size: 14px; font-weight: 600; font-family: inherit;
    background: #2563eb; color: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    letter-spacing: 0.3px;
    pointer-events: auto;
  }
  .print-btn:hover { background: #1d4ed8; }

  @media print {
    .title-bar { position: relative; background: #1a1a2e; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .leaflet-control-zoom, .view-toggle, .print-btn { display: none !important; }
    #map { height: 90vh; }
    .legend { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
<body>

<div class="title-bar">
  <h1>Mohawk Trail & Frontier Regional School Districts</h1>
  <p>Western Massachusetts &mdash; 12 Towns, 2 Districts</p>
</div>

<div class="view-toggle">
  <button class="view-btn" id="btn-detailed" onclick="setView('detailed')">Detailed</button>
  <button class="view-btn active" id="btn-clean" onclick="setView('clean')">Clean</button>
</div>

<button class="print-btn" onclick="window.print()">Print Map</button>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map', {
  zoomControl: true,
  attributionControl: false
}).setView([42.55, -72.75], 10);

// Two tile layers
const detailedTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', { maxZoom: 19 });
const cleanTiles = L.tileLayer('', { maxZoom: 19 });

let currentView = 'clean';
document.getElementById('map').style.background = '#ffffff';

// Colors
const MOHAWK_COLOR = '#2563eb';
const FRONTIER_COLOR = '#dc2626';
const MOHAWK_FILL = '#3b82f6';
const FRONTIER_FILL = '#ef4444';

// District town names
const districtTowns = new Set([
  'Ashfield', 'Buckland', 'Charlemont', 'Colrain', 'Hawley', 'Heath', 'Plainfield', 'Shelburne',
  'Conway', 'Deerfield', 'Sunderland', 'Whately'
]);

// High school locations
const schools = [
  { name: 'Mohawk Trail Regional School', lat: 42.6012, lng: -72.7396, district: 'Mohawk Trail', address: '26 Ashfield Rd, Shelburne Falls' },
  { name: 'Frontier Regional School', lat: 42.4773, lng: -72.6075, district: 'Frontier Regional', address: '113 North Main St, South Deerfield' }
];

// Layers
const otherTownLabels = L.layerGroup();
const districtTownLabels = L.layerGroup().addTo(map);

// Store references for view toggling
let maskLayer, maTownsLayer, districtLayer;
const TOWN_WEIGHT_DETAILED = 0.5;
const TOWN_WEIGHT_CLEAN = 1.5;
const DISTRICT_WEIGHT_DETAILED = 2.5;
const DISTRICT_WEIGHT_CLEAN = 3.5;
const MASK_WEIGHT_DETAILED = 2;
const MASK_WEIGHT_CLEAN = 3;

// Polylabel — find the visual center (pole of inaccessibility) of a polygon
// Simplified version that works well for map labels
function polylabel(polygon, precision) {
  precision = precision || 0.001;

  // Find bounding box
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  const outerRing = polygon[0];
  for (const p of outerRing) {
    if (p[0] < minX) minX = p[0];
    if (p[1] < minY) minY = p[1];
    if (p[0] > maxX) maxX = p[0];
    if (p[1] > maxY) maxY = p[1];
  }

  const width = maxX - minX;
  const height = maxY - minY;
  const cellSize = Math.max(width, height);

  if (cellSize === 0) return [(minX + maxX) / 2, (minY + maxY) / 2];

  // Use grid sampling to find the point inside the polygon farthest from edges
  let bestX = (minX + maxX) / 2;
  let bestY = (minY + maxY) / 2;
  let bestDist = -Infinity;

  // Sample on a grid
  const step = cellSize / 20;
  for (let x = minX; x <= maxX; x += step) {
    for (let y = minY; y <= maxY; y += step) {
      if (pointInPolygon(x, y, polygon)) {
        const dist = distToPolygonEdge(x, y, polygon);
        if (dist > bestDist) {
          bestDist = dist;
          bestX = x;
          bestY = y;
        }
      }
    }
  }

  // Refine around best point
  const refineStep = step / 4;
  for (let x = bestX - step; x <= bestX + step; x += refineStep) {
    for (let y = bestY - step; y <= bestY + step; y += refineStep) {
      if (pointInPolygon(x, y, polygon)) {
        const dist = distToPolygonEdge(x, y, polygon);
        if (dist > bestDist) {
          bestDist = dist;
          bestX = x;
          bestY = y;
        }
      }
    }
  }

  return [bestX, bestY];
}

function pointInPolygon(x, y, polygon) {
  const ring = polygon[0];
  let inside = false;
  for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
    const xi = ring[i][0], yi = ring[i][1];
    const xj = ring[j][0], yj = ring[j][1];
    if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) {
      inside = !inside;
    }
  }
  return inside;
}

function distToPolygonEdge(x, y, polygon) {
  let minDist = Infinity;
  for (const ring of polygon) {
    for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
      const d = distToSegment(x, y, ring[j][0], ring[j][1], ring[i][0], ring[i][1]);
      if (d < minDist) minDist = d;
    }
  }
  return minDist;
}

function distToSegment(px, py, ax, ay, bx, by) {
  const dx = bx - ax, dy = by - ay;
  const len2 = dx * dx + dy * dy;
  if (len2 === 0) return Math.sqrt((px - ax) * (px - ax) + (py - ay) * (py - ay));
  let t = ((px - ax) * dx + (py - ay) * dy) / len2;
  t = Math.max(0, Math.min(1, t));
  const cx = ax + t * dx, cy = ay + t * dy;
  return Math.sqrt((px - cx) * (px - cx) + (py - cy) * (py - cy));
}

// Get visual center for any GeoJSON feature
function getVisualCenter(feature) {
  const geom = feature.geometry;
  if (geom.type === 'Polygon') {
    const center = polylabel(geom.coordinates);
    return [center[1], center[0]]; // [lat, lng]
  } else if (geom.type === 'MultiPolygon') {
    // Use the largest polygon
    let largest = geom.coordinates[0];
    let largestArea = 0;
    for (const poly of geom.coordinates) {
      const a = ringArea(poly[0]);
      if (a > largestArea) { largestArea = a; largest = poly; }
    }
    const center = polylabel(largest);
    return [center[1], center[0]];
  }
  return null;
}

function ringArea(ring) {
  let area = 0;
  for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
    area += ring[j][0] * ring[i][1] - ring[i][0] * ring[j][1];
  }
  return Math.abs(area / 2);
}

// Load all data
Promise.all([
  fetch('districts.geojson').then(r => r.json()),
  fetch('ma-towns.geojson').then(r => r.json()),
  fetch('ma-mask.geojson').then(r => r.json())
]).then(([districts, maTowns, maMask]) => {

  // 1. White mask hides everything outside Massachusetts
  maskLayer = L.geoJSON(maMask, {
    style: { fillColor: '#ffffff', fillOpacity: 1, color: '#666', weight: MASK_WEIGHT_DETAILED, opacity: 0.8 }
  }).addTo(map);

  // 2. All MA town boundaries
  const otherLabelData = [];
  maTownsLayer = L.geoJSON(maTowns, {
    style: feature => {
      const name = feature.properties.NAME || '';
      if (districtTowns.has(name)) {
        return { fillColor: 'transparent', fillOpacity: 0, color: '#ccc', weight: TOWN_WEIGHT_DETAILED };
      }
      return { fillColor: '#f5f5f5', fillOpacity: 0.4, color: '#ccc', weight: TOWN_WEIGHT_DETAILED };
    },
    onEachFeature: (feature, layer) => {
      const name = feature.properties.NAME || '';
      if (!districtTowns.has(name) && name) {
        const center = getVisualCenter(feature);
        if (center) {
          otherLabelData.push({ name, lat: center[0], lng: center[1] });
        }
      }
    }
  }).addTo(map);

  // Add other town labels (no collision avoidance for these — too many, shown only at high zoom)
  otherLabelData.forEach(item => {
    L.marker([item.lat, item.lng], {
      icon: L.divIcon({ className: 'town-label-other', html: item.name, iconSize: [80, 16], iconAnchor: [40, 8] })
    }).addTo(otherTownLabels);
  });

  // 3. District town polygons — colored, on top
  districtLayer = L.geoJSON(districts, {
    style: feature => {
      const isMohawk = feature.properties.district === 'mohawk';
      return {
        fillColor: isMohawk ? MOHAWK_FILL : FRONTIER_FILL,
        fillOpacity: 0.35,
        color: isMohawk ? MOHAWK_COLOR : FRONTIER_COLOR,
        weight: DISTRICT_WEIGHT_DETAILED,
        opacity: 0.9
      };
    },
    onEachFeature: (feature, layer) => {
      const name = feature.properties.census_name;
      const district = feature.properties.district === 'mohawk' ? 'Mohawk Trail' : 'Frontier Regional';
      layer.bindPopup(`<strong>${name}</strong><br>${district} School District`);
    }
  }).addTo(map);

  // 4. District town name labels — using polylabel visual center + collision avoidance
  const districtLabelData = [];
  districts.features.forEach(feature => {
    const center = getVisualCenter(feature);
    if (center) {
      districtLabelData.push({
        name: feature.properties.census_name,
        lat: center[0],
        lng: center[1]
      });
    }
  });

  // Manual nudge for Sunderland — it sits too close to Whately
  districtLabelData.forEach(item => {
    if (item.name === 'Sunderland') item.lat += 0.012;
  });

  districtLabelData.forEach(item => {
    L.marker([item.lat, item.lng], {
      icon: L.divIcon({ className: 'town-label', html: item.name, iconSize: [90, 16], iconAnchor: [45, 8] }),
      zIndexOffset: 500
    }).addTo(districtTownLabels);
  });

  // Fit to districts with padding
  map.fitBounds(districtLayer.getBounds().pad(0.15));
  map.panBy([0, -30]);

  // Default to clean view
  setView('clean');
});

// School pins — simple colored pins, no labels, lower z-index than text
schools.forEach(school => {
  const color = school.district === 'Mohawk Trail' ? MOHAWK_COLOR : FRONTIER_COLOR;
  const pinIcon = L.divIcon({
    className: '',
    html: `<div style="position:relative;">
      <svg width="30" height="42" viewBox="0 0 30 42">
        <path d="M15 0C6.7 0 0 6.7 0 15c0 10.5 15 27 15 27s15-16.5 15-27C30 6.7 23.3 0 15 0z" fill="${color}" stroke="#fff" stroke-width="2"/>
        <circle cx="15" cy="14" r="6" fill="#fff"/>
      </svg>
    </div>`,
    iconSize: [30, 42],
    iconAnchor: [15, 42],
    popupAnchor: [0, -42]
  });
  L.marker([school.lat, school.lng], { icon: pinIcon, zIndexOffset: -100 }).addTo(map)
    .bindPopup(`<strong>${school.name}</strong><br>${school.address}`);
});

// Zoom-dependent label visibility
function updateLabels() {
  const zoom = map.getZoom();
  // Other MA towns: only at high zoom
  if (zoom >= 11) {
    if (!map.hasLayer(otherTownLabels)) map.addLayer(otherTownLabels);
  } else {
    if (map.hasLayer(otherTownLabels)) map.removeLayer(otherTownLabels);
  }
  // District town names: show at medium zoom and above
  if (zoom >= 9) {
    if (!map.hasLayer(districtTownLabels)) map.addLayer(districtTownLabels);
  } else {
    if (map.hasLayer(districtTownLabels)) map.removeLayer(districtTownLabels);
  }
}
map.on('zoomend', updateLabels);
updateLabels();

// View toggle
function setView(mode) {
  currentView = mode;
  document.getElementById('btn-detailed').classList.toggle('active', mode === 'detailed');
  document.getElementById('btn-clean').classList.toggle('active', mode === 'clean');

  if (mode === 'clean') {
    map.removeLayer(detailedTiles);
    document.getElementById('map').style.background = '#ffffff';
    if (maTownsLayer) maTownsLayer.setStyle(feature => {
      const name = (feature.properties.NAME || feature.properties.massgis_name || '');
      if (districtTowns.has(name)) {
        return { fillColor: 'transparent', fillOpacity: 0, color: '#999', weight: TOWN_WEIGHT_CLEAN };
      }
      return { fillColor: '#f5f5f5', fillOpacity: 0.3, color: '#999', weight: TOWN_WEIGHT_CLEAN };
    });
    if (districtLayer) districtLayer.setStyle(feature => {
      const isMohawk = feature.properties.district === 'mohawk';
      return {
        fillColor: isMohawk ? MOHAWK_FILL : FRONTIER_FILL,
        fillOpacity: 0.35,
        color: isMohawk ? MOHAWK_COLOR : FRONTIER_COLOR,
        weight: DISTRICT_WEIGHT_CLEAN,
        opacity: 0.9
      };
    });
    if (maskLayer) maskLayer.setStyle({ fillColor: '#ffffff', fillOpacity: 1, color: '#333', weight: MASK_WEIGHT_CLEAN, opacity: 1 });
  } else {
    if (!map.hasLayer(detailedTiles)) detailedTiles.addTo(map);
    document.getElementById('map').style.background = '';
    if (maTownsLayer) maTownsLayer.setStyle(feature => {
      const name = (feature.properties.NAME || feature.properties.massgis_name || '');
      if (districtTowns.has(name)) {
        return { fillColor: 'transparent', fillOpacity: 0, color: '#ccc', weight: TOWN_WEIGHT_DETAILED };
      }
      return { fillColor: '#f5f5f5', fillOpacity: 0.4, color: '#ccc', weight: TOWN_WEIGHT_DETAILED };
    });
    if (districtLayer) districtLayer.setStyle(feature => {
      const isMohawk = feature.properties.district === 'mohawk';
      return {
        fillColor: isMohawk ? MOHAWK_FILL : FRONTIER_FILL,
        fillOpacity: 0.35,
        color: isMohawk ? MOHAWK_COLOR : FRONTIER_COLOR,
        weight: DISTRICT_WEIGHT_DETAILED,
        opacity: 0.9
      };
    });
    if (maskLayer) maskLayer.setStyle({ fillColor: '#ffffff', fillOpacity: 1, color: '#666', weight: MASK_WEIGHT_DETAILED, opacity: 0.8 });
  }
}

// Legend — just districts
const legend = L.control({ position: 'bottomright' });
legend.onAdd = function() {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = `
    <h4>School Districts</h4>
    <div class="legend-item">
      <div class="legend-swatch" style="background:${MOHAWK_FILL};"></div>
      <span>Mohawk Trail Regional (8 towns)</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background:${FRONTIER_FILL};"></div>
      <span>Frontier Regional (4 towns)</span>
    </div>
  `;
  return div;
};
legend.addTo(map);
</script>
</body>
</html>
