<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mohawk Trail & Frontier Regional School Districts</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  #map { width: 100%; height: 100vh; }
  .legend {
    background: rgba(255,255,255,0.95);
    padding: 14px 18px;
    border-radius: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    font-size: 14px;
    line-height: 1.8;
    color: #333;
  }
  .legend h4 { margin: 0 0 8px 0; font-size: 15px; color: #111; }
  .legend-item { display: flex; align-items: center; gap: 8px; }
  .legend-swatch {
    width: 18px; height: 18px; border-radius: 3px; border: 1px solid rgba(0,0,0,0.2);
    flex-shrink: 0;
  }
  .title-bar {
    position: absolute; top: 0; left: 0; right: 0; z-index: 1000;
    background: rgba(26,26,46,0.92); backdrop-filter: blur(8px);
    padding: 12px 20px; text-align: center;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .title-bar h1 { font-size: 20px; font-weight: 600; color: #fff; letter-spacing: 0.3px; }
  .title-bar p { font-size: 13px; color: #aaa; margin-top: 2px; }

  /* District town labels — rendered above pins */
  .town-label {
    background: none !important; border: none !important; box-shadow: none !important;
    font-size: 12px; font-weight: 700; color: #222;
    text-shadow:
      -1px -1px 0 rgba(255,255,255,0.95),
       1px -1px 0 rgba(255,255,255,0.95),
      -1px  1px 0 rgba(255,255,255,0.95),
       1px  1px 0 rgba(255,255,255,0.95),
       0   -2px 3px rgba(255,255,255,0.8),
       0    2px 3px rgba(255,255,255,0.8);
    white-space: nowrap; text-align: center;
    pointer-events: none;
  }
  /* Other MA town labels */
  .town-label-other {
    background: none !important; border: none !important; box-shadow: none !important;
    font-size: 9px; font-weight: 400; color: #999;
    text-shadow: 1px 1px 1px #fff, -1px -1px 1px #fff;
    white-space: nowrap; text-align: center;
    pointer-events: none;
  }
  /* Reference city labels */
  .city-label {
    background: none !important; border: none !important; box-shadow: none !important;
    font-size: 11px; font-weight: 600; color: #666;
    text-shadow: 1px 1px 2px #fff, -1px -1px 2px #fff, 0 0 4px #fff;
    white-space: nowrap; text-align: center;
    pointer-events: none;
  }
  .leaflet-control-attribution { display: none !important; }

  /* View toggle — inline at bottom of zoom presets */
  .view-toggle {
    display: flex; gap: 0;
    border-top: 1px solid #ddd;
  }
  .view-btn {
    padding: 5px 0; border: none; cursor: pointer;
    font-size: 10px; font-weight: 500; font-family: inherit;
    background: rgba(255,255,255,0.85); color: #555;
    transition: background 0.15s, color 0.15s;
    flex: 1; text-align: center;
  }
  .view-btn:not(:last-child) { border-right: 1px solid #ddd; }
  .view-btn.active { background: #2563eb; color: #fff; }
  .view-btn:hover:not(.active) { background: rgba(255,255,255,1); color: #333; }

  /* Print button */
  .print-btn {
    position: absolute; bottom: 30px; left: 14px; z-index: 1001;
    padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer;
    font-size: 14px; font-weight: 600; font-family: inherit;
    background: #2563eb; color: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    pointer-events: auto;
  }
  .print-btn:hover { background: #1d4ed8; }

  /* Zoom presets */
  .zoom-presets {
    position: absolute; top: 65px; left: 14px; z-index: 1000;
    display: flex; flex-direction: column; gap: 0; border-radius: 6px; overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }
  .zoom-btn {
    padding: 7px 14px; border: none; cursor: pointer;
    font-size: 12px; font-weight: 500; font-family: inherit;
    background: rgba(255,255,255,0.85); color: #555;
    transition: background 0.15s, color 0.15s;
    text-align: left; white-space: nowrap;
  }
  .zoom-btn:not(:last-child) { border-bottom: 1px solid #ddd; }
  .zoom-btn.active { background: #2563eb; color: #fff; }
  .zoom-btn:hover:not(.active) { background: rgba(255,255,255,1); color: #333; }

  @media print {
    .title-bar { position: relative; background: #1a1a2e; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .leaflet-control-zoom, .view-toggle, .print-btn, .zoom-presets { display: none !important; }
    #map { height: 90vh; }
    .legend { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
<body>

<div class="title-bar">
  <h1>Mohawk Trail &amp; Frontier Regional School Districts</h1>
  <p>Western Massachusetts &mdash; 12 Towns, 2 Districts</p>
</div>

<div class="zoom-presets">
  <button class="zoom-btn active" id="zp-local" onclick="zoomPreset('local')">Local</button>
  <button class="zoom-btn" id="zp-valley" onclick="zoomPreset('valley')">Valley</button>
  <button class="zoom-btn" id="zp-western" onclick="zoomPreset('western')">Western MA</button>
  <button class="zoom-btn" id="zp-state" onclick="zoomPreset('state')">State</button>
  <div class="view-toggle">
    <button class="view-btn" id="btn-detailed" onclick="setView('detailed')">Detailed</button>
    <button class="view-btn active" id="btn-clean" onclick="setView('clean')">Clean</button>
  </div>
</div>

<button class="print-btn" onclick="window.print()">Print Map</button>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@turf/turf@7/turf.min.js"></script>
<script>
const map = L.map('map', {
  zoomControl: true,
  attributionControl: false
}).setView([42.55, -72.75], 10);

// Tile layers
const detailedTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', { maxZoom: 19 });

let currentView = 'clean';
document.getElementById('map').style.background = '#ffffff';

// Colors
const MOHAWK_COLOR = '#2563eb';
const FRONTIER_COLOR = '#dc2626';
const MOHAWK_FILL = '#3b82f6';
const FRONTIER_FILL = '#ef4444';

// District town names
const districtTowns = new Set([
  'Ashfield', 'Buckland', 'Charlemont', 'Colrain', 'Hawley', 'Heath', 'Plainfield', 'Shelburne',
  'Conway', 'Deerfield', 'Sunderland', 'Whately'
]);

// High school locations
const schools = [
  { name: 'Mohawk Trail Regional School', lat: 42.6012, lng: -72.7396, district: 'Mohawk Trail', address: '26 Ashfield Rd, Shelburne Falls' },
  { name: 'Frontier Regional School', lat: 42.4773, lng: -72.6075, district: 'Frontier Regional', address: '113 North Main St, South Deerfield' }
];

// Manual label position overrides
const labelNudges = {
  'Sunderland': [0.008, 0],
  'Whately': [-0.005, 0],
  'Deerfield': [0.005, 0],
};

// County FIPS codes
const COUNTY_VALLEY = new Set(['011', '015', '013']); // Franklin, Hampshire, Hampden
const COUNTY_WESTERN = new Set(['011', '015', '013', '003', '027']); // + Berkshire, Worcester
let currentPreset = 'local';

// Reference cities — ~10 across the state for geographic context
const referenceCities = [

  { name: 'Northampton', lat: 42.3251, lng: -72.6412, showAt: ['valley','western','state'] },
  { name: 'Springfield', lat: 42.1015, lng: -72.5898, showAt: ['valley','western','state'] },
  { name: 'Pittsfield', lat: 42.4501, lng: -73.2526, showAt: ['western','state'] },
  { name: 'Amherst', lat: 42.3732, lng: -72.5199, showAt: ['valley'] },
  { name: 'Worcester', lat: 42.2626, lng: -71.8023, showAt: ['state'] },
  { name: 'Boston', lat: 42.3601, lng: -71.0589, showAt: ['state'] },
  { name: 'Holyoke', lat: 42.2043, lng: -72.6162, showAt: ['valley'] },
  { name: 'North Adams', lat: 42.7009, lng: -73.1087, showAt: ['western','state'] },
];

// Layers
const otherTownLabels = L.layerGroup();
const districtTownLabels = L.layerGroup().addTo(map);
const cityLabelsGroup = L.layerGroup();
// County borders removed — just town lines everywhere

let maskLayer, maTownsLayer, districtLayer;
let allOtherLabels = [];
let cityMarkers = [];

// Use Turf.js for proper label placement
function getLabelPoint(feature) {
  try {
    const poly = feature.geometry.type === 'MultiPolygon'
      ? turf.polygon(feature.geometry.coordinates[0])
      : turf.polygon(feature.geometry.coordinates);
    const pt = turf.pointOnFeature(poly);
    return [pt.geometry.coordinates[1], pt.geometry.coordinates[0]];
  } catch(e) {
    const centroid = turf.centroid(feature);
    return [centroid.geometry.coordinates[1], centroid.geometry.coordinates[0]];
  }
}

// Create reference city markers
referenceCities.forEach(city => {
  // Small circle marker
  const dot = L.circleMarker([city.lat, city.lng], {
    radius: 3, fillColor: '#666', fillOpacity: 0.7,
    color: '#555', weight: 1, interactive: false
  });
  // Label
  const labelAnchor = city.labelOffset ? [50 - city.labelOffset[0], -4 - city.labelOffset[1]] : [50, -4];
  const label = L.marker([city.lat, city.lng], {
    icon: L.divIcon({
      className: 'city-label',
      html: city.name,
      iconSize: [100, 18],
      iconAnchor: labelAnchor
    }),
    interactive: false
  });
  const group = L.layerGroup([dot, label]);
  group._cityData = city;
  cityMarkers.push(group);
});

// Load data
Promise.all([
  fetch('districts.geojson').then(r => r.json()),
  fetch('ma-towns.geojson').then(r => r.json()),
  fetch('ma-mask.geojson').then(r => r.json())
]).then(([districts, maTowns, maMask]) => {

  // 1. Mask — hides everything outside MA
  maskLayer = L.geoJSON(maMask, {
    style: { fillColor: '#ffffff', fillOpacity: 1, color: '#999', weight: 1.5, opacity: 0.8 },
    interactive: false
  }).addTo(map);

  // 2. All MA town boundaries
  maTownsLayer = L.geoJSON(maTowns, {
    style: feature => {
      const name = feature.properties.NAME || '';
      if (districtTowns.has(name)) {
        return { fillColor: 'transparent', fillOpacity: 0, color: '#999', weight: 1.5 };
      }
      return { fillColor: '#f5f5f5', fillOpacity: 0.3, color: '#999', weight: 1.5 };
    },
    onEachFeature: (feature, layer) => {
      const name = feature.properties.NAME || '';
      const countyFips = feature.properties.COUNTYFP || '';
      if (!districtTowns.has(name) && name) {
        // Strip " Town", " city" suffixes
        let displayName = name.replace(/ Town$/i, '').replace(/ city$/i, '');
        // Skip if a reference city exists at this location (avoid double labels)
        const isRefCity = referenceCities.some(c => c.name.toLowerCase() === displayName.toLowerCase());
        if (isRefCity) return;
        // Manual overrides for towns with bad polylabel placement
        const otherTownNudges = {
          'New Salem': [0.01, 0.02],  // push south and east toward center
        };
        let center = getLabelPoint(feature);
        const otherNudge = otherTownNudges[displayName];
        if (otherNudge && center) {
          center = [center[0] - otherNudge[0], center[1] + otherNudge[1]];
        }
        if (center) {
          const marker = L.marker(center, {
            icon: L.divIcon({
              className: 'town-label-other',
              html: displayName,
              iconSize: [80, 16],
              iconAnchor: [40, 8]
            }),
            interactive: false
          });
          marker._countyFips = countyFips;
          marker._townName = displayName;
          allOtherLabels.push(marker);
          marker.addTo(otherTownLabels);
        }
      }
    }
  }).addTo(map);

  // County borders removed — just clean town lines

  // 3. District polygons — colored
  districtLayer = L.geoJSON(districts, {
    style: feature => {
      const isMohawk = feature.properties.district === 'mohawk';
      return {
        fillColor: isMohawk ? MOHAWK_FILL : FRONTIER_FILL,
        fillOpacity: 0.35,
        color: isMohawk ? MOHAWK_COLOR : FRONTIER_COLOR,
        weight: 3.5,
        opacity: 0.9
      };
    },
    onEachFeature: (feature, layer) => {
      const name = feature.properties.census_name;
      const district = feature.properties.district === 'mohawk' ? 'Mohawk Trail' : 'Frontier Regional';
      layer.bindPopup(`<strong>${name}</strong><br>${district} School District`);
    }
  }).addTo(map);

  // 4. District town labels — using Turf.js + manual nudges
  districts.features.forEach(feature => {
    const name = feature.properties.census_name;
    let center = getLabelPoint(feature);
    if (!center) return;

    const nudge = labelNudges[name];
    if (nudge) {
      center = [center[0] + nudge[0], center[1] + nudge[1]];
    }

    L.marker(center, {
      icon: L.divIcon({
        className: 'town-label',
        html: name,
        iconSize: [100, 20],
        iconAnchor: [50, 10]
      }),
      zIndexOffset: 1000,
      interactive: false
    }).addTo(districtTownLabels);
  });

  // Fit view
  map.fitBounds(districtLayer.getBounds().pad(0.15), {animate: false});
  map.panBy([0, -30], {animate: false});

  // Apply clean view
  setView('clean');
  updateCities();
});

// School pins
schools.forEach(school => {
  const color = school.district === 'Mohawk Trail' ? MOHAWK_COLOR : FRONTIER_COLOR;
  const pinIcon = L.divIcon({
    className: '',
    html: `<div style="position:relative;">
      <svg width="30" height="42" viewBox="0 0 30 42">
        <path d="M15 0C6.7 0 0 6.7 0 15c0 10.5 15 27 15 27s15-16.5 15-27C30 6.7 23.3 0 15 0z" fill="${color}" stroke="#fff" stroke-width="2"/>
        <circle cx="15" cy="14" r="6" fill="#fff"/>
      </svg>
    </div>`,
    iconSize: [30, 42],
    iconAnchor: [15, 42],
    popupAnchor: [0, -42]
  });
  L.marker([school.lat, school.lng], { icon: pinIcon, zIndexOffset: -100 }).addTo(map)
    .bindPopup(`<strong>${school.name}</strong><br>${school.address}`);
});

// Zoom-dependent labels with dynamic sizing
function updateLabels() {
  const zoom = map.getZoom();

  if (zoom >= 10) {
    if (!map.hasLayer(otherTownLabels)) map.addLayer(otherTownLabels);
  } else {
    if (map.hasLayer(otherTownLabels)) map.removeLayer(otherTownLabels);
  }

  if (zoom >= 9) {
    if (!map.hasLayer(districtTownLabels)) map.addLayer(districtTownLabels);
  } else {
    if (map.hasLayer(districtTownLabels)) map.removeLayer(districtTownLabels);
  }

  const labelSize = zoom <= 9 ? 9 : zoom === 10 ? 10 : 12;
  document.querySelectorAll('.town-label').forEach(el => {
    el.style.fontSize = labelSize + 'px';
  });

  const otherSize = zoom <= 10 ? 7 : 9;
  document.querySelectorAll('.town-label-other').forEach(el => {
    el.style.fontSize = otherSize + 'px';
  });
}
map.on('zoomend', () => { updateLabels(); updateTownVisibility(); updateCities(); });
updateLabels();

// Update reference cities visibility based on current preset
function updateCities() {
  cityMarkers.forEach(group => {
    const city = group._cityData;
    const shouldShow = city.showAt.includes(currentPreset);
    if (shouldShow) {
      if (!map.hasLayer(group)) group.addTo(map);
    } else {
      if (map.hasLayer(group)) map.removeLayer(group);
    }
  });
}

// View toggle
function setView(mode) {
  currentView = mode;
  document.getElementById('btn-detailed').classList.toggle('active', mode === 'detailed');
  document.getElementById('btn-clean').classList.toggle('active', mode === 'clean');

  if (map.hasLayer(detailedTiles)) map.removeLayer(detailedTiles);

  if (mode === 'clean') {
    document.getElementById('map').style.background = '#ffffff';
    if (maTownsLayer) maTownsLayer.setStyle(f => {
      const name = f.properties.NAME || f.properties.massgis_name || '';
      return districtTowns.has(name)
        ? { fillColor: 'transparent', fillOpacity: 0, color: '#999', weight: 1.5 }
        : { fillColor: '#f5f5f5', fillOpacity: 0.3, color: '#999', weight: 1.5 };
    });
    if (districtLayer) districtLayer.setStyle(f => {
      const m = f.properties.district === 'mohawk';
      return { fillColor: m ? MOHAWK_FILL : FRONTIER_FILL, fillOpacity: 0.35, color: m ? MOHAWK_COLOR : FRONTIER_COLOR, weight: 3.5, opacity: 0.9 };
    });
    if (maskLayer) maskLayer.setStyle({ fillColor: '#ffffff', fillOpacity: 1, color: '#999', weight: 1.5, opacity: 0.8 });
  } else {
    detailedTiles.addTo(map);
    document.getElementById('map').style.background = '';
    if (maTownsLayer) maTownsLayer.setStyle(f => {
      const name = f.properties.NAME || f.properties.massgis_name || '';
      return districtTowns.has(name)
        ? { fillColor: 'transparent', fillOpacity: 0, color: '#ccc', weight: 0.5 }
        : { fillColor: '#f5f5f5', fillOpacity: 0.4, color: '#ccc', weight: 0.5 };
    });
    if (districtLayer) districtLayer.setStyle(f => {
      const m = f.properties.district === 'mohawk';
      return { fillColor: m ? MOHAWK_FILL : FRONTIER_FILL, fillOpacity: 0.35, color: m ? MOHAWK_COLOR : FRONTIER_COLOR, weight: 2.5, opacity: 0.9 };
    });
    if (maskLayer) maskLayer.setStyle({ fillColor: '#ffffff', fillOpacity: 1, color: '#999', weight: 1.5, opacity: 0.8 });
  }
}

// Zoom presets
function zoomPreset(preset) {
  currentPreset = preset;
  ['local','valley','western','state'].forEach(p => {
    document.getElementById('zp-' + p).classList.toggle('active', p === preset);
  });

  if (preset === 'local') {
    map.fitBounds(districtLayer.getBounds().pad(0.15), {animate: false});
  } else if (preset === 'valley') {
    map.setView([42.25, -72.65], 9, {animate: false});
  } else if (preset === 'western') {
    map.setView([42.3, -72.5], 8, {animate: false});
  } else if (preset === 'state') {
    map.setView([42.2, -71.8], 8, {animate: false});
  }

  // Hide state outline and non-relevant towns at valley/local zoom
  if (maskLayer) {
    if (preset === 'valley' || preset === 'local') {
      maskLayer.setStyle({ fillColor: '#ffffff', fillOpacity: 1, color: 'transparent', weight: 0, opacity: 0 });
    } else {
      maskLayer.setStyle({ fillColor: '#ffffff', fillOpacity: 1, color: '#999', weight: 1.5, opacity: 0.8 });
    }
  }

  updateTownVisibility();
  updateCities();
}

function updateTownVisibility() {
  if (!maTownsLayer) return;

  maTownsLayer.eachLayer(layer => {
    const feat = layer.feature;
    if (!feat) return;
    const name = feat.properties.NAME || '';
    if (districtTowns.has(name)) return;

    const countyFips = feat.properties.COUNTYFP || '';
    let visible = false;

    if (currentPreset === 'state') visible = true;
    else if (currentPreset === 'western') visible = COUNTY_WESTERN.has(countyFips);
    else if (currentPreset === 'valley') visible = COUNTY_VALLEY.has(countyFips);
    else visible = true;

    if (visible) {
      layer.setStyle({ fillColor: '#f5f5f5', fillOpacity: 0.3, color: '#999', weight: 1.5, opacity: 1 });
    } else {
      layer.setStyle({ fillColor: 'transparent', fillOpacity: 0, color: 'transparent', weight: 0, opacity: 0 });
    }
  });

  allOtherLabels.forEach(marker => {
    let visible = false;
    if (currentPreset === 'state') visible = true;
    else if (currentPreset === 'western') visible = COUNTY_WESTERN.has(marker._countyFips);
    else if (currentPreset === 'valley') visible = COUNTY_VALLEY.has(marker._countyFips);
    else visible = true;

    if (visible) {
      if (!otherTownLabels.hasLayer(marker)) otherTownLabels.addLayer(marker);
    } else {
      if (otherTownLabels.hasLayer(marker)) otherTownLabels.removeLayer(marker);
    }
  });
}

// Legend
const legend = L.control({ position: 'bottomright' });
legend.onAdd = function() {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = `
    <h4>School Districts</h4>
    <div class="legend-item">
      <div class="legend-swatch" style="background:${MOHAWK_FILL};"></div>
      <span>Mohawk Trail Regional (8 towns)</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background:${FRONTIER_FILL};"></div>
      <span>Frontier Regional (4 towns)</span>
    </div>
  `;
  return div;
};
legend.addTo(map);
</script>
</body>
</html>
