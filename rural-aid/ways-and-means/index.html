<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f8f9fa; color: #1a1a2e;
    line-height: 1.5;
  }
  .header {
    background: #1a1a2e; color: #fff;
    padding: 24px 32px; text-align: center;
  }
  .header h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .header p { font-size: 13px; color: #94a3b8; }
  .search-bar {
    max-width: 600px; margin: 24px auto 16px;
    padding: 0 16px;
  }
  .search-bar input {
    width: 100%; padding: 14px 18px;
    border: 2px solid #e2e8f0; border-radius: 10px;
    font-size: 16px; outline: none;
    background: #fff;
    transition: border-color .2s;
  }
  .search-bar input:focus { border-color: #3b82f6; }
  .search-bar input::placeholder { color: #94a3b8; }
  .stats {
    text-align: center; font-size: 13px; color: #64748b;
    margin-bottom: 16px;
  }
  .results {
    max-width: 600px; margin: 0 auto;
    padding: 0 16px 40px;
  }
  .town-card {
    background: #fff; border-radius: 10px;
    padding: 16px 20px; margin-bottom: 10px;
    border: 1px solid #e2e8f0;
    transition: box-shadow .2s;
  }
  .town-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .town-name {
    font-size: 17px; font-weight: 600; color: #1a1a2e;
    margin-bottom: 8px;
  }
  .member {
    padding: 6px 0;
    border-top: 1px solid #f1f5f9;
    font-size: 14px;
  }
  .member:first-child { border-top: none; }
  .member-name { font-weight: 600; }
  .member-detail { color: #64748b; font-size: 13px; }
  .member-role {
    display: inline-block; background: #dbeafe; color: #1e40af;
    font-size: 11px; font-weight: 600; padding: 2px 8px;
    border-radius: 4px; margin-left: 6px;
  }
  .member-role.republican { background: #fce7f3; color: #be185d; }
  .member-note { color: #94a3b8; font-size: 12px; font-style: italic; }
  .no-results {
    text-align: center; padding: 40px;
    color: #94a3b8; font-size: 15px;
  }
  .alpha-header {
    font-size: 13px; font-weight: 700; color: #3b82f6;
    text-transform: uppercase; letter-spacing: 1px;
    padding: 12px 0 4px; margin-top: 8px;
  }
  @media print {
    .search-bar, .stats { display: none; }
    .town-card { break-inside: avoid; box-shadow: none; border: 1px solid #ccc; }
    body { background: #fff; }
  }
</style>

const totalTowns = Object.keys(DATA).length;
const totalMembers = new Set(Object.values(DATA).flat().map(m => m.member)).size;

document.getElementById('stats').textContent =
  `${totalTowns} municipalities · ${totalMembers} committee members`;

const searchEl = document.getElementById('search');
const resultsEl = document.getElementById('results');

function renderTowns(filter) {
  const towns = Object.keys(DATA).sort();
  const filtered = filter
    ? towns.filter(t => t.toLowerCase().includes(filter.toLowerCase()))
    : towns;

  if (filtered.length === 0) {
    resultsEl.innerHTML = '<div class="no-results">No towns found</div>';
    return;
  }

  let html = '';
  let currentLetter = '';

  filtered.forEach(town => {
    const letter = town[0].toUpperCase();
    if (letter !== currentLetter) {
      currentLetter = letter;
      html += `<div class="alpha-header">${letter}</div>`;
    }

    const members = DATA[town];
    html += `<div class="town-card"><div class="town-name">${town}</div>`;
    members.forEach(m => {
      const partyClass = m.party === 'Republican' ? ' republican' : '';
      const roleTag = m.role !== 'Member'
        ? `<span class="member-role${partyClass}">${m.role}</span>` : '';
      const partyLetter = m.party === 'Democrat' ? 'D' : 'R';
      const note = m.note ? `<div class="member-note">${m.note}</div>` : '';
      html += `<div class="member">
        <div><span class="member-name">${m.member}</span> (${partyLetter}) ${roleTag}</div>
        <div class="member-detail">${m.chamber} · ${m.district}</div>
        ${note}
      </div>`;
    });
    html += '</div>';
  });

  resultsEl.innerHTML = html;
}

searchEl.addEventListener('input', () => renderTowns(searchEl.value.trim()));
renderTowns('');
