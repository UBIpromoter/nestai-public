<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mohawk Trail & Frontier Regional School Districts</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; }
  #map { width: 100%; height: 100vh; }
  .legend {
    background: rgba(255,255,255,0.95);
    padding: 12px 16px;
    border: 1.5px solid #999;
    border-radius: 4px;
    font-size: 13px;
    line-height: 2;
    color: #333;
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
  }
  .legend h4 { margin: 0 0 4px 0; font-size: 13px; font-weight: 700; color: #111; }
  .legend-item { display: flex; align-items: center; gap: 8px; }
  .legend-swatch {
    width: 16px; height: 16px; border-radius: 2px; border: 1px solid #666;
    flex-shrink: 0;
  }
  .town-label {
    background: none; border: none; box-shadow: none;
    font-weight: 600; color: #333;
    white-space: nowrap;
    text-shadow: 1px 1px 2px #fff, -1px -1px 2px #fff, 1px -1px 2px #fff, -1px 1px 2px #fff;
  }
  @media print {
    .leaflet-control-zoom, .leaflet-control-attribution { display: none !important; }
    #map { height: 100vh; page-break-inside: avoid; }
    .legend { box-shadow: none; border: 1px solid #999; }
  }
</style>
</head>
<body>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map', {
  attributionControl: false
}).setView([42.56, -72.73], 11);

// Clean light base map - roads and terrain for context, no labels from tiles
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
  maxZoom: 15,
  minZoom: 9
}).addTo(map);

const MOHAWK_FILL = '#5b8db8';
const MOHAWK_BORDER = '#2c5f8a';
const FRONTIER_FILL = '#d97b73';
const FRONTIER_BORDER = '#a8504a';

const schools = [
  { lat: 42.6012, lng: -72.7396, district: 'mohawk' },
  { lat: 42.4773, lng: -72.6075, district: 'frontier' }
];

const townCentroids = {
  'ASHFIELD': [42.528, -72.788],
  'BUCKLAND': [42.593, -72.790],
  'CHARLEMONT': [42.630, -72.870],
  'COLRAIN': [42.670, -72.700],
  'HAWLEY': [42.610, -72.880],
  'HEATH': [42.690, -72.840],
  'PLAINFIELD': [42.515, -72.920],
  'SHELBURNE': [42.610, -72.720],
  'CONWAY': [42.510, -72.700],
  'DEERFIELD': [42.540, -72.610],
  'SUNDERLAND': [42.460, -72.570],
  'WHATELY': [42.440, -72.640]
};

let labelLayer = L.layerGroup().addTo(map);

function updateLabels() {
  const zoom = map.getZoom();
  labelLayer.clearLayers();
  let fontSize;
  if (zoom <= 10) fontSize = 10;
  else if (zoom <= 11) fontSize = 12;
  else if (zoom <= 12) fontSize = 14;
  else fontSize = 16;

  Object.entries(townCentroids).forEach(([key, coords]) => {
    const displayName = key.charAt(0) + key.slice(1).toLowerCase();
    L.marker(coords, {
      icon: L.divIcon({
        className: 'town-label',
        html: '<span style="font-size:' + fontSize + 'px">' + displayName + '</span>',
        iconSize: null
      }),
      interactive: false
    }).addTo(labelLayer);
  });
}

fetch('districts.geojson')
  .then(r => r.json())
  .then(data => {
    const geojsonLayer = L.geoJSON(data, {
      style: feature => {
        const isMohawk = feature.properties.district === 'mohawk';
        return {
          fillColor: isMohawk ? MOHAWK_FILL : FRONTIER_FILL,
          fillOpacity: 0.45,
          color: isMohawk ? MOHAWK_BORDER : FRONTIER_BORDER,
          weight: 2.5,
          opacity: 1
        };
      }
    }).addTo(map);

    map.fitBounds(geojsonLayer.getBounds().pad(0.08));
    updateLabels();
  });

map.on('zoomend', updateLabels);

schools.forEach(school => {
  const color = school.district === 'mohawk' ? MOHAWK_BORDER : FRONTIER_BORDER;
  L.circleMarker([school.lat, school.lng], {
    radius: 8,
    fillColor: color,
    fillOpacity: 1,
    color: '#fff',
    weight: 3
  }).addTo(map);
});

const legend = L.control({ position: 'bottomright' });
legend.onAdd = function() {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = '<h4>School Districts</h4>' +
    '<div class="legend-item"><div class="legend-swatch" style="background:' + MOHAWK_FILL + '; border-color:' + MOHAWK_BORDER + ';"></div><span>Mohawk Trail Regional</span></div>' +
    '<div class="legend-item"><div class="legend-swatch" style="background:' + FRONTIER_FILL + '; border-color:' + FRONTIER_BORDER + ';"></div><span>Frontier Regional</span></div>' +
    '<div style="margin-top:6px; font-size:11px; color:#666;">' +
    '<span style="display:inline-block; width:12px; height:12px; border-radius:50%; background:' + MOHAWK_BORDER + '; border:2.5px solid #fff; vertical-align:middle; margin-right:4px; box-shadow:0 0 2px rgba(0,0,0,0.3);"></span> High School</div>';
  return div;
};
legend.addTo(map);
</script>
</body>
</html>
