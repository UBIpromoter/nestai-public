<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mohawk Trail & Frontier Regional School Districts</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; }
  #map { width: 100%; height: 100vh; }
  .legend {
    background: rgba(255,255,255,0.95);
    padding: 14px 18px;
    border-radius: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    font-size: 14px;
    line-height: 1.8;
    color: #333;
  }
  .legend h4 { margin: 0 0 8px 0; font-size: 15px; color: #111; }
  .legend-item { display: flex; align-items: center; gap: 8px; }
  .legend-swatch {
    width: 18px; height: 18px; border-radius: 3px; border: 1px solid rgba(0,0,0,0.2);
    flex-shrink: 0;
  }
  .title-bar {
    position: absolute; top: 0; left: 0; right: 0; z-index: 1000;
    background: rgba(26,26,46,0.92); backdrop-filter: blur(8px);
    padding: 12px 20px; text-align: center;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .title-bar h1 { font-size: 20px; font-weight: 600; color: #fff; letter-spacing: 0.3px; }
  .title-bar p { font-size: 13px; color: #aaa; margin-top: 2px; }
  .town-label {
    background: none; border: none; box-shadow: none;
    font-size: 11px; font-weight: 500; color: #333;
    text-shadow: 1px 1px 2px rgba(255,255,255,0.8), -1px -1px 2px rgba(255,255,255,0.8);
    white-space: nowrap;
  }
  .town-label-other {
    background: none; border: none; box-shadow: none;
    font-size: 9px; font-weight: 400; color: #aaa;
    text-shadow: 1px 1px 1px rgba(255,255,255,0.6);
    white-space: nowrap;
  }
  .leaflet-control-attribution { display: none !important; }
</style>
</head>
<body>

<div class="title-bar">
  <h1>Mohawk Trail & Frontier Regional School Districts</h1>
  <p>Western Massachusetts &mdash; 12 Towns, 2 Districts</p>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map', {
  zoomControl: true,
  attributionControl: true
}).setView([42.3, -72.0], 9);

// Use no-labels tiles so our own labels are clean
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
  maxZoom: 19
}).addTo(map);

// Colors
const MOHAWK_COLOR = '#2563eb';
const FRONTIER_COLOR = '#dc2626';
const MOHAWK_FILL = '#3b82f6';
const FRONTIER_FILL = '#ef4444';

// District town names for identification
const districtTowns = new Set([
  'Ashfield', 'Buckland', 'Charlemont', 'Colrain', 'Hawley', 'Heath', 'Plainfield', 'Shelburne',
  'Conway', 'Deerfield', 'Sunderland', 'Whately'
]);

// High school locations
const schools = [
  {
    name: 'Mohawk Trail Regional School',
    lat: 42.6012, lng: -72.7396,
    district: 'Mohawk Trail',
    address: '26 Ashfield Rd, Shelburne Falls'
  },
  {
    name: 'Frontier Regional School',
    lat: 42.4773, lng: -72.6075,
    district: 'Frontier Regional',
    address: '113 North Main St, South Deerfield'
  }
];

// District town label positions
const townCentroids = {
  'ASHFIELD': [42.528, -72.788],
  'BUCKLAND': [42.593, -72.790],
  'CHARLEMONT': [42.630, -72.870],
  'COLRAIN': [42.670, -72.700],
  'HAWLEY': [42.610, -72.880],
  'HEATH': [42.690, -72.840],
  'PLAINFIELD': [42.515, -72.920],
  'SHELBURNE': [42.610, -72.720],
  'CONWAY': [42.510, -72.700],
  'DEERFIELD': [42.540, -72.610],
  'SUNDERLAND': [42.460, -72.570],
  'WHATELY': [42.440, -72.640]
};

// Load all data
Promise.all([
  fetch('districts.geojson').then(r => r.json()),
  fetch('ma-towns.geojson').then(r => r.json()),
  fetch('ma-mask.geojson').then(r => r.json())
]).then(([districts, maTowns, maMask]) => {

  // 1. White mask hides everything outside Massachusetts
  L.geoJSON(maMask, {
    style: { fillColor: '#ffffff', fillOpacity: 1, color: '#555', weight: 2.5, opacity: 0.9 }
  }).addTo(map);

  // 2. All MA town boundaries — light gray outlines, no fill for district towns
  // Collect non-district town centroids for labeling
  const otherTownCentroids = [];
  L.geoJSON(maTowns, {
    style: feature => {
      const name = feature.properties.NAME || '';
      if (districtTowns.has(name)) {
        return { fillColor: 'transparent', fillOpacity: 0, color: '#ccc', weight: 0.6 };
      }
      return { fillColor: '#f0f0f0', fillOpacity: 0.5, color: '#ccc', weight: 0.6 };
    },
    onEachFeature: (feature, layer) => {
      const name = feature.properties.NAME || '';
      if (!districtTowns.has(name) && name) {
        const bounds = layer.getBounds();
        const center = bounds.getCenter();
        otherTownCentroids.push({ name, lat: center.lat, lng: center.lng });
      }
    }
  }).addTo(map);

  // 3. District town polygons — colored, on top
  const districtLayer = L.geoJSON(districts, {
    style: feature => {
      const isMohawk = feature.properties.district === 'mohawk';
      return {
        fillColor: isMohawk ? MOHAWK_FILL : FRONTIER_FILL,
        fillOpacity: 0.35,
        color: isMohawk ? MOHAWK_COLOR : FRONTIER_COLOR,
        weight: 2.5,
        opacity: 0.9
      };
    },
    onEachFeature: (feature, layer) => {
      const name = feature.properties.census_name;
      const district = feature.properties.district === 'mohawk' ? 'Mohawk Trail' : 'Frontier Regional';
      layer.bindPopup(`<strong>${name}</strong><br>${district} School District`);
    }
  }).addTo(map);

  // 4. Town name labels for the 12 district towns
  districts.features.forEach(feature => {
    const name = feature.properties.massgis_name;
    const displayName = feature.properties.census_name;
    const centroid = townCentroids[name];
    if (centroid) {
      L.marker(centroid, {
        icon: L.divIcon({ className: 'town-label', html: displayName, iconSize: null })
      }).addTo(map);
    }
  });

  // 5. Light gray labels for all other MA towns (visible when zoomed in)
  otherTownCentroids.forEach(t => {
    L.marker([t.lat, t.lng], {
      icon: L.divIcon({ className: 'town-label-other', html: t.name, iconSize: null })
    }).addTo(map);
  });

  // Fit to districts with some padding
  map.fitBounds(districtLayer.getBounds().pad(0.15));
  map.panBy([0, -30]);
});

// School pins with mascot icons
// Frontier Red Hawks — hawk silhouette
const hawkSvg = `<svg width="36" height="44" viewBox="0 0 36 44" xmlns="http://www.w3.org/2000/svg">
  <path d="M18 0C9 0 1 8 1 17c0 12 17 27 17 27s17-15 17-27C35 8 27 0 18 0z" fill="${FRONTIER_COLOR}" stroke="#fff" stroke-width="2"/>
  <g transform="translate(8,7) scale(0.04)" fill="#fff">
    <path d="M250 20c-30 40-80 80-140 100 20-10 50-30 70-60-40 30-100 50-160 40 80-10 140-50 170-90-20 10-60 30-100 30 60-20 100-60 120-100-30 20-70 40-110 30 50-20 90-60 100-100 10 30 30 70 50 100 10-30 20-60 20-90 0 50-10 90-20 140z"/>
  </g>
</svg>`;

// Mohawk Warriors — shield emblem (no Native American imagery)
const shieldSvg = `<svg width="36" height="44" viewBox="0 0 36 44" xmlns="http://www.w3.org/2000/svg">
  <path d="M18 0C9 0 1 8 1 17c0 12 17 27 17 27s17-15 17-27C35 8 27 0 18 0z" fill="${MOHAWK_COLOR}" stroke="#fff" stroke-width="2"/>
  <g transform="translate(9,7)" fill="#fff">
    <path d="M9 2L2 6v7c0 5.5 3 10.5 7 13 4-2.5 7-7.5 7-13V6L9 2z"/>
    <path d="M9 4L4 7v6c0 4.5 2.2 8.5 5 10.5 2.8-2 5-6 5-10.5V7L9 4z" fill="${MOHAWK_COLOR}"/>
    <path d="M9 8l-3 2v3c0 3 1.5 5.5 3 7 1.5-1.5 3-4 3-7v-3L9 8z" fill="#fff"/>
  </g>
</svg>`;

schools.forEach(school => {
  const isMohawk = school.district === 'Mohawk Trail';
  const svgHtml = isMohawk ? shieldSvg : hawkSvg;

  const mascotIcon = L.divIcon({
    className: '',
    html: `<div style="position:relative;">${svgHtml}</div>`,
    iconSize: [36, 44],
    iconAnchor: [18, 44],
    popupAnchor: [0, -44]
  });

  L.marker([school.lat, school.lng], { icon: mascotIcon }).addTo(map)
    .bindPopup(`<strong>${school.name}</strong><br>${school.address}`);
});

// Legend
const legend = L.control({ position: 'bottomright' });
legend.onAdd = function() {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = `
    <h4>School Districts</h4>
    <div class="legend-item">
      <div class="legend-swatch" style="background:${MOHAWK_FILL};"></div>
      <span>Mohawk Trail Regional &mdash; Warriors (8 towns)</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background:${FRONTIER_FILL};"></div>
      <span>Frontier Regional &mdash; Red Hawks (4 towns)</span>
    </div>
    <div class="legend-item" style="margin-top:6px;">
      <svg width="14" height="17" viewBox="0 0 36 44"><path d="M18 0C9 0 1 8 1 17c0 12 17 27 17 27s17-15 17-27C35 8 27 0 18 0z" fill="#666" stroke="#fff" stroke-width="2"/></svg>
      <span>High School</span>
    </div>
  `;
  return div;
};
legend.addTo(map);
</script>
</body>
</html>
