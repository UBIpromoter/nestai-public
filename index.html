<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mohawk Trail & Frontier Regional School Districts</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; }
  #map { width: 100%; height: 100vh; }
  .legend {
    background: rgba(255,255,255,0.95);
    padding: 14px 18px;
    border-radius: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    font-size: 14px;
    line-height: 1.8;
    color: #333;
  }
  .legend h4 { margin: 0 0 8px 0; font-size: 15px; color: #111; }
  .legend-item { display: flex; align-items: center; gap: 8px; }
  .legend-swatch {
    width: 18px; height: 18px; border-radius: 3px; border: 1px solid rgba(0,0,0,0.2);
    flex-shrink: 0;
  }
  .title-bar {
    position: absolute; top: 0; left: 0; right: 0; z-index: 1000;
    background: rgba(26,26,46,0.92); backdrop-filter: blur(8px);
    padding: 12px 20px; text-align: center;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .title-bar h1 { font-size: 20px; font-weight: 600; color: #fff; letter-spacing: 0.3px; }
  .title-bar p { font-size: 13px; color: #aaa; margin-top: 2px; }
  .town-label {
    background: none; border: none; box-shadow: none;
    font-size: 11px; font-weight: 600; color: #333;
    text-shadow: 1px 1px 2px rgba(255,255,255,0.9), -1px -1px 2px rgba(255,255,255,0.9);
    white-space: nowrap;
  }
  .town-label-other {
    background: none; border: none; box-shadow: none;
    font-size: 9px; font-weight: 400; color: #999;
    text-shadow: 1px 1px 1px rgba(255,255,255,0.6);
    white-space: nowrap;
  }
  .leaflet-control-attribution { display: none !important; }
  @media print {
    .title-bar { position: relative; background: #1a1a2e; }
    .leaflet-control-zoom { display: none !important; }
    #map { height: 90vh; }
  }
</style>
</head>
<body>

<div class="title-bar">
  <h1>Mohawk Trail & Frontier Regional School Districts</h1>
  <p>Western Massachusetts &mdash; 12 Towns, 2 Districts</p>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map', {
  zoomControl: true,
  attributionControl: false
}).setView([42.55, -72.75], 10);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
  maxZoom: 19
}).addTo(map);

// Colors
const MOHAWK_COLOR = '#2563eb';
const FRONTIER_COLOR = '#dc2626';
const MOHAWK_FILL = '#3b82f6';
const FRONTIER_FILL = '#ef4444';

// District town names
const districtTowns = new Set([
  'Ashfield', 'Buckland', 'Charlemont', 'Colrain', 'Hawley', 'Heath', 'Plainfield', 'Shelburne',
  'Conway', 'Deerfield', 'Sunderland', 'Whately'
]);

// High school locations
const schools = [
  { name: 'Mohawk Trail Regional School', lat: 42.6012, lng: -72.7396, district: 'Mohawk Trail', address: '26 Ashfield Rd, Shelburne Falls' },
  { name: 'Frontier Regional School', lat: 42.4773, lng: -72.6075, district: 'Frontier Regional', address: '113 North Main St, South Deerfield' }
];

// District town label positions
const townCentroids = {
  'ASHFIELD': [42.528, -72.788],
  'BUCKLAND': [42.593, -72.790],
  'CHARLEMONT': [42.630, -72.870],
  'COLRAIN': [42.670, -72.700],
  'HAWLEY': [42.610, -72.880],
  'HEATH': [42.690, -72.840],
  'PLAINFIELD': [42.515, -72.920],
  'SHELBURNE': [42.610, -72.720],
  'CONWAY': [42.510, -72.700],
  'DEERFIELD': [42.540, -72.610],
  'SUNDERLAND': [42.460, -72.570],
  'WHATELY': [42.440, -72.640]
};

// Layers for zoom-dependent visibility
const otherTownLabels = L.layerGroup();
const districtTownLabels = L.layerGroup().addTo(map);

// Load all data
Promise.all([
  fetch('districts.geojson').then(r => r.json()),
  fetch('ma-towns.geojson').then(r => r.json()),
  fetch('ma-mask.geojson').then(r => r.json())
]).then(([districts, maTowns, maMask]) => {

  // 1. White mask hides everything outside Massachusetts
  L.geoJSON(maMask, {
    style: { fillColor: '#ffffff', fillOpacity: 1, color: '#666', weight: 2, opacity: 0.8 }
  }).addTo(map);

  // 2. All MA town boundaries
  L.geoJSON(maTowns, {
    style: feature => {
      const name = feature.properties.NAME || '';
      if (districtTowns.has(name)) {
        return { fillColor: 'transparent', fillOpacity: 0, color: '#ccc', weight: 0.5 };
      }
      return { fillColor: '#f5f5f5', fillOpacity: 0.4, color: '#ccc', weight: 0.5 };
    },
    onEachFeature: (feature, layer) => {
      const name = feature.properties.NAME || '';
      if (!districtTowns.has(name) && name) {
        const bounds = layer.getBounds();
        const center = bounds.getCenter();
        L.marker([center.lat, center.lng], {
          icon: L.divIcon({ className: 'town-label-other', html: name, iconSize: null })
        }).addTo(otherTownLabels);
      }
    }
  }).addTo(map);

  // 3. District town polygons — colored, on top
  const districtLayer = L.geoJSON(districts, {
    style: feature => {
      const isMohawk = feature.properties.district === 'mohawk';
      return {
        fillColor: isMohawk ? MOHAWK_FILL : FRONTIER_FILL,
        fillOpacity: 0.35,
        color: isMohawk ? MOHAWK_COLOR : FRONTIER_COLOR,
        weight: 2.5,
        opacity: 0.9
      };
    },
    onEachFeature: (feature, layer) => {
      const name = feature.properties.census_name;
      const district = feature.properties.district === 'mohawk' ? 'Mohawk Trail' : 'Frontier Regional';
      layer.bindPopup(`<strong>${name}</strong><br>${district} School District`);
    }
  }).addTo(map);

  // 4. District town name labels
  districts.features.forEach(feature => {
    const name = feature.properties.massgis_name;
    const displayName = feature.properties.census_name;
    const centroid = townCentroids[name];
    if (centroid) {
      L.marker(centroid, {
        icon: L.divIcon({ className: 'town-label', html: displayName, iconSize: null })
      }).addTo(districtTownLabels);
    }
  });

  // Fit to districts with padding
  map.fitBounds(districtLayer.getBounds().pad(0.15));
  map.panBy([0, -30]);
});

// School pins — simple colored pins, no labels
schools.forEach(school => {
  const color = school.district === 'Mohawk Trail' ? MOHAWK_COLOR : FRONTIER_COLOR;
  const pinIcon = L.divIcon({
    className: '',
    html: `<div style="position:relative;">
      <svg width="30" height="42" viewBox="0 0 30 42">
        <path d="M15 0C6.7 0 0 6.7 0 15c0 10.5 15 27 15 27s15-16.5 15-27C30 6.7 23.3 0 15 0z" fill="${color}" stroke="#fff" stroke-width="2"/>
        <circle cx="15" cy="14" r="6" fill="#fff"/>
      </svg>
    </div>`,
    iconSize: [30, 42],
    iconAnchor: [15, 42],
    popupAnchor: [0, -42]
  });
  L.marker([school.lat, school.lng], { icon: pinIcon }).addTo(map)
    .bindPopup(`<strong>${school.name}</strong><br>${school.address}`);
});

// Zoom-dependent label visibility
function updateLabels() {
  const zoom = map.getZoom();
  // Other MA town labels only show when zoomed in enough
  if (zoom >= 11) {
    if (!map.hasLayer(otherTownLabels)) map.addLayer(otherTownLabels);
  } else {
    if (map.hasLayer(otherTownLabels)) map.removeLayer(otherTownLabels);
  }
  // District town labels always visible, but hide at very low zoom
  if (zoom >= 9) {
    if (!map.hasLayer(districtTownLabels)) map.addLayer(districtTownLabels);
  } else {
    if (map.hasLayer(districtTownLabels)) map.removeLayer(districtTownLabels);
  }
}
map.on('zoomend', updateLabels);
updateLabels();

// Legend — just districts and pin
const legend = L.control({ position: 'bottomright' });
legend.onAdd = function() {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = `
    <h4>School Districts</h4>
    <div class="legend-item">
      <div class="legend-swatch" style="background:${MOHAWK_FILL};"></div>
      <span>Mohawk Trail Regional (8 towns)</span>
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background:${FRONTIER_FILL};"></div>
      <span>Frontier Regional (4 towns)</span>
    </div>
    <div class="legend-item" style="margin-top:6px;">
      <svg width="14" height="17" viewBox="0 0 30 42"><path d="M15 0C6.7 0 0 6.7 0 15c0 10.5 15 27 15 27s15-16.5 15-27C30 6.7 23.3 0 15 0z" fill="#666" stroke="#fff" stroke-width="2"/><circle cx="15" cy="14" r="6" fill="#fff"/></svg>
      <span>High School</span>
    </div>
  `;
  return div;
};
legend.addTo(map);
</script>
</body>
</html>
