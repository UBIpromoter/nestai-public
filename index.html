<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mohawk Trail & Frontier Regional School Districts</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #333; }
  #map { width: 100%; height: 100vh; background: #fff; }
  .legend {
    background: #fff;
    padding: 12px 16px;
    border: 1.5px solid #999;
    border-radius: 4px;
    font-size: 13px;
    line-height: 2;
    color: #333;
  }
  .legend h4 { margin: 0 0 4px 0; font-size: 13px; font-weight: 700; color: #111; }
  .legend-item { display: flex; align-items: center; gap: 8px; }
  .legend-swatch {
    width: 16px; height: 16px; border-radius: 2px; border: 1px solid #666;
    flex-shrink: 0;
  }
  .town-label {
    background: none; border: none; box-shadow: none;
    font-size: 11px; font-weight: 600; color: #444;
    white-space: nowrap;
    letter-spacing: 0.3px;
  }
  .leaflet-container { background: #fff !important; }
  @media print {
    body, #map, .leaflet-container { background: #fff !important; }
    .leaflet-control-zoom, .leaflet-control-attribution { display: none !important; }
    #map { height: 100vh; page-break-inside: avoid; }
  }
</style>
</head>
<body>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map', {
  zoomControl: false,
  attributionControl: false
}).setView([42.56, -72.73], 11);

const MOHAWK_FILL = '#b0c4de';
const MOHAWK_BORDER = '#4a6fa5';
const FRONTIER_FILL = '#f4a6a0';
const FRONTIER_BORDER = '#c0504d';

const schools = [
  { lat: 42.6012, lng: -72.7396, district: 'mohawk' },
  { lat: 42.4773, lng: -72.6075, district: 'frontier' }
];

const townCentroids = {
  'ASHFIELD': [42.528, -72.788],
  'BUCKLAND': [42.593, -72.790],
  'CHARLEMONT': [42.630, -72.870],
  'COLRAIN': [42.670, -72.700],
  'HAWLEY': [42.610, -72.880],
  'HEATH': [42.690, -72.840],
  'PLAINFIELD': [42.515, -72.920],
  'SHELBURNE': [42.610, -72.720],
  'CONWAY': [42.510, -72.700],
  'DEERFIELD': [42.540, -72.610],
  'SUNDERLAND': [42.460, -72.570],
  'WHATELY': [42.440, -72.640]
};

fetch('districts.geojson')
  .then(r => r.json())
  .then(data => {
    const geojsonLayer = L.geoJSON(data, {
      style: feature => {
        const isMohawk = feature.properties.district === 'mohawk';
        return {
          fillColor: isMohawk ? MOHAWK_FILL : FRONTIER_FILL,
          fillOpacity: 0.6,
          color: isMohawk ? MOHAWK_BORDER : FRONTIER_BORDER,
          weight: 2,
          opacity: 1
        };
      }
    }).addTo(map);

    data.features.forEach(feature => {
      const name = feature.properties.massgis_name;
      const displayName = feature.properties.census_name;
      const centroid = townCentroids[name];
      if (centroid) {
        L.marker(centroid, {
          icon: L.divIcon({
            className: 'town-label',
            html: displayName,
            iconSize: null
          }),
          interactive: false
        }).addTo(map);
      }
    });

    map.fitBounds(geojsonLayer.getBounds().pad(0.05));
  });

schools.forEach(school => {
  const color = school.district === 'mohawk' ? MOHAWK_BORDER : FRONTIER_BORDER;
  L.circleMarker([school.lat, school.lng], {
    radius: 7,
    fillColor: color,
    fillOpacity: 1,
    color: '#fff',
    weight: 2.5
  }).addTo(map);
});

const legend = L.control({ position: 'bottomright' });
legend.onAdd = function() {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = '<h4>School Districts</h4>' +
    '<div class="legend-item"><div class="legend-swatch" style="background:#b0c4de; border-color:#4a6fa5;"></div><span>Mohawk Trail Regional</span></div>' +
    '<div class="legend-item"><div class="legend-swatch" style="background:#f4a6a0; border-color:#c0504d;"></div><span>Frontier Regional</span></div>' +
    '<div style="margin-top:6px; font-size:11px; color:#666;">' +
    '<span style="display:inline-block; width:10px; height:10px; border-radius:50%; background:#4a6fa5; border:2px solid #fff; vertical-align:middle; margin-right:4px;"></span> High School</div>';
  return div;
};
legend.addTo(map);
</script>
</body>
</html>
